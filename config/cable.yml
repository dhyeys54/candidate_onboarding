# Redis (not the default "async" adapter) because Procfile.dev runs the web server and the Sidekiq
# worker as separate processes — ParseCandidateCvJob broadcasts Turbo Stream updates from the worker
# process, and the async adapter only delivers within the process that broadcast them.
development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/0") %>
  channel_prefix: dental_onboarding_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/0") %>
  channel_prefix: dental_onboarding_production
